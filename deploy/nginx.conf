# swipe.hot nginx configuration
# Usage: copy to /etc/nginx/conf.d/swipehot.conf or symlink from sites-enabled
#
# Paths assume: /home/deploy/swipehot/ is the repo root
#   SPA build:     packages/frontend/dist/        (Vite output)
#   PHP API:       packages/frontend/public/api/   (production PHP files)
#   Content pages: packages/frontend/public/       (models, blog, listicles, legal)

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name swipe.hot;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name swipe.hot;

    # SSL (managed by certbot / FastPanel)
    ssl_certificate /etc/letsencrypt/live/swipe.hot/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swipe.hot/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # --- Routes (order matters: most specific first) ---

    # PHP API (production — served via php-fpm, NOT Node.js)
    location /api/ {
        alias /home/deploy/swipehot/packages/frontend/public/api/;
        index index.php;
        try_files $uri $uri/ =404;

        location ~ \.php$ {
            fastcgi_pass unix:/run/php/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
            fastcgi_read_timeout 30s;
        }
    }

    # Admin dashboard (PHP)
    location /admin/ {
        alias /home/deploy/swipehot/packages/frontend/public/admin/;
        index index.php;
        try_files $uri $uri/ /admin/index.php;

        location ~ \.php$ {
            fastcgi_pass unix:/run/php/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }

    # Category hubs (living listicles) — must be before SPA catch-all
    location ~ ^/([a-z-]+)-cams(/.*)?$ {
        root /home/deploy/swipehot/packages/frontend/public;
        try_files $uri $uri/ /$1-cams/index.html =404;
        expires 30m;
    }

    # Content pages: model profiles
    location /models/ {
        alias /home/deploy/swipehot/packages/frontend/public/models/;
        try_files $uri $uri.html $uri/index.html =404;
        expires 1h;
    }

    # Content pages: blog posts
    location /blog/ {
        alias /home/deploy/swipehot/packages/frontend/public/blog/;
        try_files $uri $uri.html $uri/index.html =404;
        expires 1h;
    }

    # Legal pages
    location /legal/ {
        alias /home/deploy/swipehot/packages/frontend/public/legal/;
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Sitemap + robots
    location = /sitemap.xml {
        root /home/deploy/swipehot/packages/frontend/public;
    }
    location = /robots.txt {
        root /home/deploy/swipehot/packages/frontend/public;
    }

    # Frontend SPA (Vite build output) — catch-all, must be last
    location / {
        root /home/deploy/swipehot/packages/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Don't cache index.html
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # Block common probes
    location ~ /\. {
        deny all;
    }
}
