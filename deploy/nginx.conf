# xcam.vip nginx configuration
# Usage: ln -s /home/deploy/xcamvip/deploy/nginx.conf /etc/nginx/sites-enabled/xcamvip

upstream xcamvip_api {
    server 127.0.0.1:3001;
    keepalive 8;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name xcam.vip www.xcam.vip;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name xcam.vip www.xcam.vip;

    # SSL (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/xcam.vip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xcam.vip/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # --- Routes ---

    # API proxy
    location /api/ {
        proxy_pass http://xcamvip_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Frontend SPA (Vite build output)
    location / {
        root /home/deploy/xcamvip/packages/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Don't cache index.html
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # Content pages (pre-rendered HTML — future)
    location /models/ {
        alias /home/deploy/xcamvip/public/models/;
        try_files $uri $uri.html $uri/index.html =404;
        expires 1h;
    }

    location /blog/ {
        alias /home/deploy/xcamvip/public/blog/;
        try_files $uri $uri.html $uri/index.html =404;
        expires 1h;
    }

    # Legal pages
    location /legal/ {
        alias /home/deploy/xcamvip/public/legal/;
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Block common probes
    location ~ /\. {
        deny all;
    }
}
