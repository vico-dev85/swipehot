<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LiveJasmin Test — Roulette</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

  /* Dual iframe player — test preloading */
  #player { position: fixed; inset: 0; width: 100%; height: 100%; background: #111; }
  .player-frame {
    position: absolute; inset: 0; width: 100%; height: 100%; border: none;
    transition: opacity 0.3s ease;
  }
  .player-frame.active { opacity: 1; z-index: 2; }
  .player-frame.preload { opacity: 0; z-index: 1; }

  #top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  }
  #top-bar .brand { font-size: 18px; font-weight: 900; }
  #top-bar .brand .dot { color: #FE2C55; }
  #top-bar .info { font-size: 13px; color: #aaa; text-align: right; }
  #top-bar .info .status-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 700; margin-left: 6px;
  }
  .badge-free { background: #00F891; color: #000; }
  .badge-member { background: #FFD740; color: #000; }
  .badge-private { background: #FE2C55; color: #fff; }
  .badge-offline { background: #555; color: #999; }

  #controls {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 16px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    display: flex; flex-direction: column; gap: 10px;
  }
  #performer-info .name { font-size: 20px; font-weight: 600; }
  #performer-info .meta { font-size: 13px; color: #aaa; margin-top: 4px; }
  #performer-info .tags { font-size: 11px; color: #666; margin-top: 4px; max-height: 32px; overflow: hidden; }

  .btn-row { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 12px 16px; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: transform 0.15s;
  }
  .btn:active { transform: scale(0.95); }
  .btn-next { background: #FE2C55; color: #fff; }
  .btn-prev { background: rgba(255,255,255,0.15); color: #fff; flex: 0 0 auto; }
  .btn-cta { background: #00F891; color: #000; }
  .btn-refresh { background: rgba(255,200,0,0.9); color: #000; flex: 0 0 auto; }

  #category-filter { display: flex; gap: 6px; justify-content: center; margin-bottom: 2px; flex-wrap: wrap; }
  .cat-btn {
    padding: 7px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
    background: transparent; color: #aaa; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .cat-btn.active { background: #FE2C55; color: #fff; border-color: #FE2C55; }

  #status-filter { display: flex; gap: 6px; justify-content: center; margin-bottom: 4px; }
  .status-btn {
    padding: 5px 10px; border: 1px solid rgba(255,255,255,0.15); border-radius: 16px;
    background: transparent; color: #666; font-size: 11px; font-weight: 600; cursor: pointer;
  }
  .status-btn.active { background: rgba(0,248,145,0.2); color: #00F891; border-color: rgba(0,248,145,0.4); }

  #loading {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #000; gap: 16px;
  }
  #loading .spinner {
    width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #FE2C55; border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .text { color: #aaa; font-size: 14px; }
  .hidden { display: none !important; }

  #stats { position: fixed; top: 48px; right: 16px; z-index: 100; font-size: 11px; color: #666; text-align: right; line-height: 1.6; }

  /* Sound indicator */
  #sound-test {
    position: fixed; top: 48px; left: 16px; z-index: 100;
    font-size: 11px; padding: 4px 10px; border-radius: 8px;
    background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15); color: #aaa;
  }
  #sound-test.has-sound { background: rgba(0,248,145,0.2); color: #00F891; border-color: rgba(0,248,145,0.3); }

  /* Preload mode toggle */
  .toggle-btn {
    padding: 5px 10px; border: 1px solid rgba(255,255,255,0.15); border-radius: 16px;
    background: transparent; color: #666; font-size: 11px; font-weight: 600; cursor: pointer;
  }
  .toggle-btn.on { background: rgba(0,248,145,0.2); color: #00F891; border-color: rgba(0,248,145,0.4); }

  /* Log panel */
  #log-panel {
    position: fixed; top: 0; right: 0; width: 400px; height: 100%; z-index: 300;
    background: rgba(0,0,0,0.92); border-left: 1px solid #333;
    display: none; flex-direction: column; font-family: 'Courier New', monospace; font-size: 11px;
  }
  #log-panel.show { display: flex; }
  #log-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; border-bottom: 1px solid #333; background: rgba(30,30,30,0.95);
  }
  #log-header span { font-weight: 700; font-size: 13px; }
  #log-header button {
    padding: 4px 10px; border: 1px solid #555; border-radius: 6px;
    background: transparent; color: #aaa; font-size: 11px; cursor: pointer;
  }
  #log-header button:hover { background: #333; }
  #log-content { flex: 1; overflow-y: auto; padding: 8px; line-height: 1.5; }
  #log-content .log-entry { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); word-break: break-all; }
  .log-time { color: #666; } .log-performer { color: #FE2C55; font-weight: 700; }
  .log-event { color: #00F891; } .log-nav { color: #FFD740; }
  .log-warn { color: #ff6b6b; } .log-msg { color: #888; } .log-info { color: #00F0FF; }

  #log-toggle {
    position: fixed; top: 12px; right: 16px; z-index: 100;
    padding: 4px 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
    background: rgba(0,0,0,0.6); color: #aaa; font-size: 11px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="text">Loading LiveJasmin performers...</div>
</div>

<div id="player">
  <iframe id="frame-a" class="player-frame active" allow="autoplay; encrypted-media; fullscreen" allowfullscreen frameborder="0"></iframe>
  <iframe id="frame-b" class="player-frame preload" allow="autoplay; encrypted-media; fullscreen" allowfullscreen frameborder="0"></iframe>
</div>

<div id="top-bar">
  <div class="brand">livejasmin<span class="dot">.</span>test</div>
  <div class="info">
    <span id="counter">0 / 0</span>
    <span id="status-badge" class="status-badge badge-offline">-</span>
  </div>
</div>

<div id="sound-test">Checking sound...</div>
<button id="log-toggle" onclick="toggleLog()">LOG</button>
<div id="stats"></div>

<div id="log-panel">
  <div id="log-header">
    <span>Event Log</span>
    <div>
      <button onclick="copyLog()">Copy</button>
      <button onclick="clearLog()">Clear</button>
      <button onclick="toggleLog()">X</button>
    </div>
  </div>
  <div id="log-content"></div>
</div>

<div id="controls">
  <div id="category-filter">
    <button class="cat-btn active" data-cat="girl">Women</button>
    <button class="cat-btn" data-cat="boy">Men</button>
    <button class="cat-btn" data-cat="transgender">Trans</button>
    <button class="cat-btn" data-cat="couple">Couples</button>
    <button class="cat-btn" data-cat="lesbian">Lesbian</button>
    <button class="cat-btn" data-cat="mature">Mature</button>
    <button class="cat-btn" data-cat="fetish">Fetish</button>
  </div>
  <div id="status-filter">
    <button class="status-btn" data-status="">All Online</button>
    <button class="status-btn active" data-status="free_chat">Free Only</button>
    <button class="status-btn" data-status="member_chat">Member</button>
    <button class="toggle-btn" id="preload-btn" onclick="togglePreload()">Preload: OFF</button>
  </div>
  <div id="performer-info">
    <div class="name" id="perf-name">-</div>
    <div class="meta" id="perf-meta"></div>
    <div class="tags" id="perf-tags"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-prev" onclick="prevPerformer()">Back</button>
    <button class="btn btn-next" onclick="nextPerformer()">Next</button>
    <button class="btn btn-refresh" onclick="refreshPool()">Refresh</button>
    <button class="btn btn-cta" onclick="openRoom()">Watch Live</button>
  </div>
</div>

<script>
// ========== CONFIG ==========
const API_URL = '/api/livejasmin-pool.php';
const SESSION_ID = 'lj_' + Math.random().toString(36).substring(2, 10);
const PSID = 'vicoawe';
const EMBED_BASE = 'https://atwmcd.com/live-stream/';

let performers = [];
let currentIndex = -1;
let currentCategory = 'girl';
let currentStatusFilter = 'free_chat';
let loading = false;
let currentPerformerName = null;
let performerLoadedAt = null;
let preloadEnabled = false; // Test if dual-iframe preloading works (sound leak?)
let soundDetected = null; // null = unknown, true/false

// Dual iframe refs
const frameA = document.getElementById('frame-a');
const frameB = document.getElementById('frame-b');
let activeFrame = frameA;
let preloadFrame = frameB;

// ========== LOG ==========
const logEntries = [];
const logContent = document.getElementById('log-content');
const logPanel = document.getElementById('log-panel');

function ts() {
  const d = new Date();
  return d.toTimeString().split(' ')[0] + '.' + String(d.getMilliseconds()).padStart(3,'0');
}

function addLog(type, text) {
  const time = ts();
  const performer = currentPerformerName || '-';
  const raw = `[${time}] [${performer}] [${type}] ${text}`;
  logEntries.push(raw);
  console.log(raw);
  const clsMap = { EVENT: 'log-event', NAV: 'log-nav', WARN: 'log-warn', MSG: 'log-msg', INFO: 'log-info' };
  const el = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="log-time">${time}</span> <span class="log-performer">${esc(performer)}</span> <span class="${clsMap[type]||''}">[${type}]</span> ${esc(text)}`;
  logContent.appendChild(el);
  logContent.scrollTop = logContent.scrollHeight;
}

function esc(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toggleLog() { logPanel.classList.toggle('show'); }
function clearLog() { logEntries.length = 0; logContent.innerHTML = ''; }
function copyLog() {
  navigator.clipboard.writeText(logEntries.join('\n'))
    .then(() => addLog('INFO', `Copied ${logEntries.length} entries`))
    .catch(() => { const t = document.createElement('textarea'); t.value = logEntries.join('\n'); document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); });
}

// ========== DOM REFS ==========
const loadingEl = document.getElementById('loading');
const counterEl = document.getElementById('counter');
const statusBadge = document.getElementById('status-badge');
const perfName = document.getElementById('perf-name');
const perfMeta = document.getElementById('perf-meta');
const perfTags = document.getElementById('perf-tags');
const statsEl = document.getElementById('stats');
const soundEl = document.getElementById('sound-test');

// ========== EMBED URL BUILDER ==========
function buildEmbedUrl(performerName, category) {
  // Direct iframe URL — this is what the AWE embed script creates internally
  return `${EMBED_BASE}?site=jsm&cobrandId=&psid=${PSID}&pstool=202_1&psprogram=revs&campaign_id=&forcedPerformers[0]=${encodeURIComponent(performerName)}&vp[showChat]=0&vp[chatAutoHide]=1&vp[showCallToAction]=0&vp[showPerformerName]=0&vp[showPerformerStatus]=0&subAffId=swipehot-roulette&categoryName=${encodeURIComponent(category)}&embedTool=1`;
}

// ========== PRELOAD TOGGLE ==========
function togglePreload() {
  preloadEnabled = !preloadEnabled;
  const btn = document.getElementById('preload-btn');
  btn.textContent = `Preload: ${preloadEnabled ? 'ON' : 'OFF'}`;
  btn.classList.toggle('on', preloadEnabled);
  addLog('EVENT', `Preload: ${preloadEnabled ? 'ON (dual iframe)' : 'OFF (single iframe)'}`);

  if (!preloadEnabled) {
    // Reset preload frame
    preloadFrame.src = 'about:blank';
    preloadFrame.classList.remove('active');
    preloadFrame.classList.add('preload');
  }
}

// ========== CATEGORY FILTER ==========
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = btn.dataset.cat;
    performers = [];
    currentIndex = -1;
    addLog('NAV', `Category: ${currentCategory}`);
    fetchPerformers();
  });
});

// ========== STATUS FILTER ==========
document.querySelectorAll('.status-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStatusFilter = btn.dataset.status;
    performers = [];
    currentIndex = -1;
    addLog('NAV', `Status: ${currentStatusFilter || 'all'}`);
    fetchPerformers();
  });
});

// ========== KEYBOARD + TOUCH ==========
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPerformer(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevPerformer(); }
  if (e.key === 'Enter') { e.preventDefault(); openRoom(); }
  if (e.key === 'l' || e.key === 'L') { toggleLog(); }
  if (e.key === 'p' || e.key === 'P') { togglePreload(); }
});

let touchStartY = 0;
document.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', (e) => {
  const dy = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 50) { dy > 0 ? nextPerformer() : prevPerformer(); }
}, { passive: true });

// ========== postMessage LISTENER ==========
window.addEventListener('message', (e) => {
  if (e.origin === window.location.origin) return;
  let d;
  try { d = typeof e.data === 'string' ? e.data.substring(0,500) : JSON.stringify(e.data).substring(0,500); }
  catch(err) { d = String(e.data).substring(0,300); }
  addLog('MSG', `${e.origin}: ${d}`);
});

// ========== FETCH PERFORMERS ==========
async function fetchPerformers(replace) {
  if (loading) return;
  loading = true;
  if (currentIndex === -1) loadingEl.classList.remove('hidden');

  try {
    const params = new URLSearchParams({
      category: currentCategory,
      count: '100',
      session_id: SESSION_ID,
      extended: '1',
    });
    if (currentStatusFilter) params.set('status_filter', currentStatusFilter);

    addLog('NAV', `Fetching ${currentCategory} (status=${currentStatusFilter || 'all'})...`);
    const res = await fetch(`${API_URL}?${params}`);
    const data = await res.json();

    if (data.error) {
      addLog('WARN', 'API error: ' + JSON.stringify(data));
      loadingEl.querySelector('.text').textContent = 'Error: ' + data.error;
      return;
    }

    if (data.performers && data.performers.length > 0) {
      const extra = `cache:${data.from_cache ? 'hit' : 'fresh'} seen:${data.seen_filtered||0} banned:${data.banned_filtered||0}`;

      if (replace) {
        performers = data.performers;
        addLog('EVENT', `Refreshed: ${data.count} performers (API total: ${data.total}) ${extra}`);
        if (currentIndex >= performers.length) currentIndex = 0;
        showPerformer();
      } else {
        performers = performers.concat(data.performers);
        addLog('EVENT', `+${data.count} (pool: ${performers.length}, API total: ${data.total}) ${extra}`);
        if (currentIndex === -1) { currentIndex = 0; showPerformer(); }
      }

      // Status breakdown
      const sc = {};
      data.performers.forEach(p => { sc[p.status] = (sc[p.status]||0) + 1; });
      addLog('INFO', `Statuses: ${JSON.stringify(sc)}`);

      statsEl.innerHTML = `Pool: ${performers.length}<br>API: ${data.total}<br>${Object.entries(sc).map(([k,v])=>`${k}: ${v}`).join('<br>')}`;
    } else {
      addLog('WARN', 'No performers');
      if (currentIndex === -1) loadingEl.querySelector('.text').textContent = 'No performers found';
    }
  } catch (err) {
    addLog('WARN', 'Fetch error: ' + err.message);
    if (currentIndex === -1) loadingEl.querySelector('.text').textContent = 'Network error';
  } finally {
    loading = false;
    if (performers.length > 0) loadingEl.classList.add('hidden');
  }
}

// ========== REFRESH ==========
function refreshPool() {
  addLog('NAV', '--- REFRESH ---');
  loading = false;
  fetchPerformers(true);
}

// ========== SHOW PERFORMER ==========
function showPerformer() {
  if (currentIndex < 0 || currentIndex >= performers.length) return;

  const p = performers[currentIndex];
  currentPerformerName = p.name;
  performerLoadedAt = Date.now();

  addLog('NAV', `#${currentIndex}: ${p.name} (${p.status} r:${p.rating} age:${p.age} ${p.ethnicity})`);

  // UI updates
  perfName.textContent = p.name;
  const parts = [];
  if (p.age) parts.push(`Age ${p.age}`);
  if (p.ethnicity) parts.push(p.ethnicity);
  if (p.country) parts.push(p.country);
  if (p.rating) parts.push(`${p.rating}/5`);
  if (p.stream_quality) parts.push(`Q${p.stream_quality}/9`);
  if (p.hair_color) parts.push(p.hair_color);
  if (p.build) parts.push(p.build);
  perfMeta.textContent = parts.join(' · ');
  perfTags.textContent = (p.willingnesses || []).join(', ');

  const badgeMap = {
    'free_chat': ['FREE', 'badge-free'],
    'member_chat': ['MEMBER', 'badge-member'],
    'private_chat': ['PRIVATE', 'badge-private'],
    'offline': ['OFFLINE', 'badge-offline'],
  };
  const [bt, bc] = badgeMap[p.status] || [p.status, 'badge-offline'];
  statusBadge.textContent = bt;
  statusBadge.className = 'status-badge ' + bc;
  counterEl.textContent = `${currentIndex + 1} / ${performers.length}`;

  // Build embed URL
  const embedUrl = buildEmbedUrl(p.name, p.category || currentCategory);

  if (preloadEnabled) {
    // Dual iframe: swap active/preload
    // The preload frame should already have the next performer loaded
    // Swap roles
    const tmp = activeFrame;
    activeFrame = preloadFrame;
    preloadFrame = tmp;

    activeFrame.classList.remove('preload');
    activeFrame.classList.add('active');
    preloadFrame.classList.remove('active');
    preloadFrame.classList.add('preload');

    // If active frame doesn't have the right URL, load it now
    if (!activeFrame.src.includes(encodeURIComponent(p.name))) {
      activeFrame.src = embedUrl;
    }

    // Preload next
    preloadNext();
  } else {
    // Single iframe: just set src
    activeFrame.src = embedUrl;
    activeFrame.classList.add('active');
    activeFrame.classList.remove('preload');
    preloadFrame.src = 'about:blank';
    preloadFrame.classList.add('preload');
    preloadFrame.classList.remove('active');
  }

  // Auto-fetch more when near end
  if (currentIndex >= performers.length - 10 && !loading) {
    fetchPerformers();
  }
}

// ========== PRELOAD NEXT ==========
function preloadNext() {
  if (!preloadEnabled) return;
  const nextIdx = currentIndex + 1;
  if (nextIdx >= performers.length) return;

  const next = performers[nextIdx];
  const url = buildEmbedUrl(next.name, next.category || currentCategory);
  preloadFrame.src = url;
  addLog('INFO', `Preloading: ${next.name}`);
}

// ========== NAVIGATION ==========
function nextPerformer() {
  if (currentPerformerName) {
    const sec = ((Date.now() - performerLoadedAt) / 1000).toFixed(1);
    addLog('NAV', `Leave ${currentPerformerName} (${sec}s)`);
  }
  if (currentIndex < performers.length - 1) {
    currentIndex++;
    showPerformer();
  } else {
    addLog('WARN', 'End of pool');
  }
}

function prevPerformer() {
  if (currentPerformerName) {
    const sec = ((Date.now() - performerLoadedAt) / 1000).toFixed(1);
    addLog('NAV', `Back from ${currentPerformerName} (${sec}s)`);
  }
  if (currentIndex > 0) {
    currentIndex--;
    showPerformer();
  }
}

function openRoom() {
  if (currentIndex < 0 || currentIndex >= performers.length) return;
  const p = performers[currentIndex];
  addLog('EVENT', `CTA: ${p.name}`);
  // chatRoomUrl has tracking baked in, but it's a redirect — open in new tab
  if (p.chat_room_url) {
    window.open(p.chat_room_url, '_blank');
  } else {
    window.open(`https://www.livejasmin.com/en/chat/${encodeURIComponent(p.name)}`, '_blank');
  }
}

// ========== SOUND DETECTION ==========
// Try to detect if audio is playing from the iframe (via AudioContext if possible)
// This is best-effort — cross-origin iframes block direct audio access
function checkSoundIndicator() {
  // We can't directly detect audio from cross-origin iframes
  // But we can note: "Check your speakers! Does sound play automatically?"
  soundEl.textContent = 'Sound: check speakers!';
  soundEl.className = '';
  // User can report via log
  addLog('INFO', 'SOUND TEST: Does the embed play audio automatically? Press L to open log and note result');
}

// ========== START ==========
addLog('INFO', `Session: ${SESSION_ID}`);
addLog('INFO', `Keys: Space/Right=next, Left=back, Enter=CTA, L=log, P=preload toggle`);
addLog('INFO', `Embed pattern: ${EMBED_BASE} (direct iframe, no AWE script)`);
checkSoundIndicator();
fetchPerformers();
</script>
</body>
</html>
