<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{metaTags}}
    {{schemaMarkup}}
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #000;
        color: #e0e0e0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      a { color: #FE2C55; text-decoration: none; }
      a:hover { text-decoration: underline; }

      .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 16px;
      }

      /* Header / Nav */
      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        margin-bottom: 20px;
      }
      .nav-brand {
        font-size: 18px;
        font-weight: 700;
        color: #FE2C55;
      }
      .nav-links a {
        color: #888;
        font-size: 13px;
        margin-left: 16px;
      }
      .nav-links a:hover { color: #fff; }

      /* Breadcrumb */
      .breadcrumb {
        font-size: 12px;
        color: #666;
        margin-bottom: 16px;
      }
      .breadcrumb a { color: #888; }

      /* Media (embed or thumbnail) */
      .embed-container {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%; /* 16:9 */
        background: #111;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 16px;
      }
      .embed-container iframe {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        border: none;
      }
      .live-badge {
        position: absolute;
        top: 12px;
        left: 12px;
        background: #FE2C55;
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 4px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .thumbnail-container {
        position: relative;
        width: 100%;
        aspect-ratio: 16/9;
        background: #111;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 16px;
      }
      .thumbnail-container img {
        width: 100%; height: 100%;
        object-fit: cover;
      }
      .offline-badge {
        position: absolute;
        top: 12px;
        left: 12px;
        background: #444;
        color: #aaa;
        font-size: 11px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 4px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .roulette-cta {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: #FE2C55;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 24px;
        border-radius: 999px;
        white-space: nowrap;
      }
      .roulette-cta:hover { background: #e0264d; text-decoration: none; }

      /* Model header */
      .model-header {
        margin-bottom: 16px;
      }
      .model-header h1 {
        font-size: 24px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 6px;
      }
      .stats {
        font-size: 13px;
        color: #888;
      }
      .stat { margin-right: 4px; }

      /* Tags */
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 20px;
      }
      .tag-pill {
        background: rgba(254,44,85,0.12);
        color: #FE2C55;
        font-size: 12px;
        font-weight: 500;
        padding: 4px 12px;
        border-radius: 999px;
        text-transform: lowercase;
      }

      /* CTA button */
      .cta-section {
        margin-bottom: 24px;
      }
      .cta-btn {
        display: inline-block;
        background: #FE2C55;
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        padding: 14px 32px;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: background 0.2s;
      }
      .cta-btn:hover { background: #e0264d; text-decoration: none; }

      /* Bio content */
      .bio {
        margin-bottom: 32px;
      }
      .bio h2 {
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        margin: 24px 0 8px;
      }
      .bio p {
        margin-bottom: 12px;
        color: #ccc;
      }

      /* Related models grid */
      .related-section {
        margin-bottom: 32px;
      }
      .related-section h2 {
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 12px;
      }
      .related-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
      }
      .related-card {
        display: flex;
        flex-direction: column;
        background: #111;
        border-radius: 10px;
        overflow: hidden;
        transition: transform 0.2s;
      }
      .related-card:hover { transform: translateY(-2px); text-decoration: none; }
      .related-card img {
        width: 100%;
        aspect-ratio: 4/3;
        object-fit: cover;
        background: #222;
      }
      .related-card span {
        padding: 8px 10px;
        font-size: 13px;
        color: #ddd;
        font-weight: 500;
      }
      .no-related {
        color: #666;
        font-size: 14px;
      }

      /* Footer */
      .footer {
        border-top: 1px solid rgba(255,255,255,0.08);
        padding: 20px 0;
        margin-top: 20px;
        text-align: center;
      }
      .footer-links {
        font-size: 12px;
        margin-bottom: 8px;
      }
      .footer-links a {
        color: #666;
        margin: 0 10px;
      }
      .footer-links a:hover { color: #999; }
      .footer-copy {
        font-size: 11px;
        color: #444;
      }

      /* Desktop tweaks */
      @media (min-width: 768px) {
        .container { padding: 24px; }
        .model-header h1 { font-size: 28px; }
        .related-grid {
          grid-template-columns: repeat(4, 1fr);
        }
      }
    </style>
</head>
<body>
  <div class="container">
    <!-- Nav -->
    <nav class="nav">
      <a href="/" class="nav-brand">{{siteName}}</a>
      <div class="nav-links">
        <a href="/">Roulette</a>
        <a href="/models/">Models</a>
      </div>
    </nav>

    <!-- Breadcrumb -->
    <div class="breadcrumb">
      <a href="/">{{siteName}}</a> &rsaquo;
      <a href="/models/">Models</a> &rsaquo;
      {{displayName}}
    </div>

    <!-- Media (embed if online, thumbnail if offline) -->
    {{mediaSection}}

    <!-- Model header -->
    <div class="model-header">
      <h1>{{displayName}} Live Cam</h1>
      <div class="stats">{{stats}}</div>
    </div>

    <!-- Tags -->
    <div class="tags">
      {{tagPills}}
    </div>

    <!-- CTA -->
    <div class="cta-section">
      <a href="{{roomUrl}}" class="cta-btn" target="_blank" rel="noopener">{{ctaText}}</a>
    </div>

    <!-- Bio -->
    <div class="bio">
      {{bio}}
    </div>

    <!-- Related Models -->
    <div class="related-section">
      <h2>Similar Models</h2>
      <div class="related-grid">
        {{relatedModels}}
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-links">
        <a href="/legal/terms.html">Terms</a>
        <a href="/legal/privacy.html">Privacy</a>
        <a href="/legal/2257.html">18 U.S.C. 2257</a>
      </div>
      <div class="footer-copy">&copy; {{year}} {{siteName}}. All rights reserved.</div>
    </footer>
  </div>
</body>
</html>
