<!-- Debug -->
<div id="debug" style="padding:10px;font-size:12px;color:#0f0;max-height:500px;overflow:auto;background:#000;border:1px solid #333;margin:10px;"></div>

<script>
function log(msg) {
  const d = document.getElementById('debug');
  d.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
  console.log(msg);
}

// Listen for postMessages
window.addEventListener('message', (e) => {
  if (e.origin === window.location.origin) return;
  let d;
  try { d = typeof e.data === 'string' ? e.data.substring(0,400) : JSON.stringify(e.data).substring(0,400); }
  catch(err) { d = String(e.data).substring(0,300); }
  log(`MSG from ${e.origin}: ${d}`);
});

log('=== SOUND TEST PAGE ===');
log('6 embeds with different sound params. Check which one has audio!');
log('T1: baseline (no sound params)');
log('T2: vp[showSound]=1');
log('T3: vp[enableSound]=1');
log('T4: vp[sound]=1 + vp[autoUnmute]=1');
log('T5: chat ON + all UI visible');
log('T6: vp[muted]=0 + vp[volume]=100');
log('Click inside each embed to interact — browser autoplay policy may require a click to unmute');
</script>
